kind = "web"
previewPath = "/"
title = "Adnan Gull Portfolio"
version = "1.0.0"
id = "artifacts/adnan-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25067

[services.development]
run = "pnpm --filter @workspace/adnan-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adnan-portfolio", "run", "build" ]
publicDir = "artifacts/adnan-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25067"
BASE_PATH = "/"
